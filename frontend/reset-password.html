<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer contraseña - Papelerías Tony</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #2f2c79, #c0392b); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; padding: 36px 32px; border-radius: 20px; max-width: 420px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo h1 { color: #2f2c79; font-size: 22px; }
        .logo p { color: #888; font-size: 13px; margin-top: 4px; }
        h2 { color: #2f2c79; font-size: 18px; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #2f2c79; }
        button { width: 100%; padding: 13px; background: #c0392b; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
        button:hover { background: #a93226; }
        .btn-login { background: #2f2c79; margin-top: 12px; }
        .btn-login:hover { background: #1e1b5e; }
        .error { color: #c0392b; font-size: 13px; margin-top: 10px; text-align: center; }
        .success-box { text-align: center; padding: 20px 0; }
        .success-box p { color: #27ae60; font-size: 16px; font-weight: bold; margin-bottom: 16px; }
        .req { font-size: 12px; color: #888; margin-top: 6px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>🏪 Papelerías Tony</h1>
            <p>Tu tienda de confianza</p>
        </div>
        <h2>🔐 Restablecer contraseña</h2>
        <div id="errorMsg" class="error"></div>
        <div id="formSection">
            <div class="form-group">
                <label>Nueva contraseña</label>
                <input type="password" id="newPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirmar contraseña</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <p class="req">La contraseña debe tener al menos 8 caracteres, una mayúscula, una minúscula, un número y un carácter especial (!@#$%^&*).</p>
            <button id="resetBtn">Actualizar contraseña</button>
        </div>
        <div id="successSection" style="display:none;" class="success-box">
            <p>✅ Contraseña actualizada correctamente</p>
            <button class="btn-login" id="goLoginBtn">Ir a iniciar sesión</button>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://papelerias-tony-backend.onrender.com/api';
        const FRONTEND_URL = 'https://papelerias-tony.onrender.com';

        const token = new URLSearchParams(window.location.search).get('token');

        if (!token) {
            document.getElementById('errorMsg').innerText = '❌ Enlace inválido. Solicita un nuevo correo de recuperación.';
            document.getElementById('formSection').style.display = 'none';
        }

        function isValidPassword(pwd) {
            if (pwd.length < 8) return 'Mínimo 8 caracteres';
            if (!/[A-Z]/.test(pwd)) return 'Falta una mayúscula';
            if (!/[a-z]/.test(pwd)) return 'Falta una minúscula';
            if (!/[0-9]/.test(pwd)) return 'Falta un número';
            if (!/[!@#$%^&*()]/.test(pwd)) return 'Falta un carácter especial (!@#$%^&*)';
            return null;
        }

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.innerText = '';

            if (newPass !== confirmPass) { errorMsg.innerText = '❌ Las contraseñas no coinciden'; return; }
            const error = isValidPassword(newPass);
            if (error) { errorMsg.innerText = `❌ ${error}`; return; }

            try {
                const res = await fetch(`${BACKEND_URL}/auth/reset`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: newPass })
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('successSection').style.display = 'block';
                } else {
                    errorMsg.innerText = `❌ ${data.message}`;
                }
            } catch (err) {
                errorMsg.innerText = '❌ Error de conexión con el servidor';
            }
        });

        document.getElementById('goLoginBtn').addEventListener('click', () => {
            window.location.href = FRONTEND_URL;
        });
    </script>
</body>
</html>
