<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Restablecer contraseña - Papelerías Tony</title>
    <style>
        body { font-family: Arial; background: #9ce0db; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 30px; max-width: 450px; width: 100%; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 40px; border: 2px solid #5dc1b9; }
        button { background: #2f2c79; color: white; cursor: pointer; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Restablecer contraseña</h2>
        <div id="debugInfo" style="background: #f0f0f0; padding: 10px; margin: 10px 0; font-size: 12px; word-break: break-all;"></div>
        <div id="errorMsg" class="error"></div>
        <div id="formSection">
            <input type="password" id="newPassword" placeholder="Nueva contraseña">
            <input type="password" id="confirmPassword" placeholder="Confirmar contraseña">
            <button id="resetBtn">Actualizar contraseña</button>
        </div>
        <div id="successSection" style="display:none;">
            <p class="success">✅ Contraseña actualizada</p>
            <button id="goLoginBtn">Iniciar sesión</button>
        </div>
    </div>

    <script>
        // === DIAGNÓSTICO COMPLETO ===
        const currentUrl = window.location.href;
        const searchParams = new URLSearchParams(window.location.search);
        const tokenFromUrl = searchParams.get('token');
        
        const debugDiv = document.getElementById('debugInfo');
        debugDiv.innerHTML = `
            <strong>🔍 DIAGNÓSTICO:</strong><br>
            URL completa: ${currentUrl}<br>
            Token en URL: ${tokenFromUrl || '❌ NO ENCONTRADO'}<br>
            ¿Hay parámetros? ${window.location.search || 'No'}<br>
            <hr>
            <strong>Instrucciones:</strong><br>
            1. Si ves "NO ENCONTRADO", el enlace no tiene token.<br>
            2. Copia el token manualmente desde la base de datos y pégalo en la URL así:<br>
            <code>?token=TOKEN_COPIADO</code>
        `;
        
        let token = tokenFromUrl;
        
        // SI NO HAY TOKEN, INTENTAR LEER DE OTRA FORMA
        if (!token) {
            // Intentar obtener del hash o de la ruta
            const hash = window.location.hash;
            if (hash && hash.includes('token=')) {
                token = hash.split('token=')[1];
                debugDiv.innerHTML += `<br>✅ Token encontrado en HASH: ${token}`;
            }
        }
        
        if (!token) {
            document.getElementById('errorMsg').innerText = '❌ No se encontró un token. Solicita un nuevo enlace de recuperación.';
            document.getElementById('formSection').style.display = 'none';
        } else {
            debugDiv.innerHTML += `<br><strong style="color:green;">✅ Token válido: ${token}</strong>`;
        }
        
        // VALIDAR CONTRASEÑA
        function isValidPassword(pwd) {
            if (pwd.length < 8) return 'Mínimo 8 caracteres';
            if (!/[A-Z]/.test(pwd)) return 'Falta una mayúscula';
            if (!/[a-z]/.test(pwd)) return 'Falta una minúscula';
            if (!/[0-9]/.test(pwd)) return 'Falta un número';
            if (!/[!@#$%^&*()]/.test(pwd)) return 'Falta un carácter especial (!@#$%^&*)';
            return null;
        }
        
        // ENVIAR RESTABLECIMIENTO
        document.getElementById('resetBtn').addEventListener('click', async () => {
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (newPass !== confirmPass) {
                document.getElementById('errorMsg').innerText = '❌ Las contraseñas no coinciden';
                return;
            }
            
            const error = isValidPassword(newPass);
            if (error) {
                document.getElementById('errorMsg').innerText = `❌ ${error}`;
                return;
            }
            
            document.getElementById('errorMsg').innerText = '';
            
            try {
                const res = await fetch('http://localhost:5000/api/auth/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: newPass })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    document.getElementById('formSection').style.display = 'none';
                    document.getElementById('successSection').style.display = 'block';
                } else {
                    document.getElementById('errorMsg').innerText = `❌ ${data.message}`;
                }
            } catch (err) {
                document.getElementById('errorMsg').innerText = '❌ Error de conexión con el servidor';
            }
        });
        
        document.getElementById('goLoginBtn').addEventListener('click', () => {
            window.location.href = 'http://localhost:8080';
        });
    </script>
</body>
</html>
